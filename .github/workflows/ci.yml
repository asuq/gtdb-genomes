name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Run pytest
        run: .venv/bin/pytest -q

  validation-a:
    name: Validation A
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gtdb-genome
          init-shell: bash
          cache-downloads: true
          cache-environment: false
          create-args: >-
            python=3.12
            uv
            pip
            ncbi-datasets-cli
            unzip

      - name: Sync project dependencies
        shell: bash -el {0}
        run: uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        shell: bash -el {0}
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Run A validation cases
        env:
          LOCAL_TEST_ROOT: /tmp/gtdb-realtests/ci-a
        shell: bash -el {0}
        run: bin/run-real-data-tests-local.sh A1 A2 A3 A4 A5 A6 A7 A8 A9

      - name: Upload A validation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-a-evidence
          path: /tmp/gtdb-realtests/ci-a/_evidence
          if-no-files-found: warn

  validation-b:
    name: Validation B
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gtdb-genome
          init-shell: bash
          cache-downloads: true
          cache-environment: false
          create-args: >-
            python=3.12
            uv
            pip
            ncbi-datasets-cli
            unzip

      - name: Sync project dependencies
        shell: bash -el {0}
        run: uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        shell: bash -el {0}
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Run B validation cases
        env:
          LOCAL_TEST_ROOT: /tmp/gtdb-realtests/ci-b
        shell: bash -el {0}
        run: bin/run-real-data-tests-local.sh B1 B2 B3 B4 B5 B6

      - name: Upload B validation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-b-evidence
          path: /tmp/gtdb-realtests/ci-b/_evidence
          if-no-files-found: warn

  validation-c-build:
    name: Validation C build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gtdb-genome
          init-shell: bash
          cache-downloads: true
          cache-environment: false
          create-args: >-
            python=3.12
            uv
            pip
            ncbi-datasets-cli
            unzip

      - name: Bootstrap GTDB taxonomy data
        shell: bash -el {0}
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Build wheel
        shell: bash -el {0}
        run: uv build

      - name: Upload built distribution
        uses: actions/upload-artifact@v6
        with:
          name: validation-c-dist
          path: dist
          if-no-files-found: error

  validation-c-runtime:
    name: Validation C runtime
    runs-on: ubuntu-latest
    needs: validation-c-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download built distribution
        uses: actions/download-artifact@v5
        with:
          name: validation-c-dist
          path: dist

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gtdb-genome-runtime
          init-shell: bash
          cache-downloads: true
          cache-environment: false
          create-args: >-
            python=3.12
            pip
            ncbi-datasets-cli
            unzip

      - name: Install built wheel into clean runtime
        shell: bash -el {0}
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Verify installed bundled taxonomy
        shell: bash -el {0}
        run: |
          python -c "import shutil; assert shutil.which('uv') is None"
          python -c "from gtdb_genomes.release_resolver import resolve_and_validate_release; resolution = resolve_and_validate_release('latest'); assert resolution.bacterial_taxonomy is not None, resolution"

      - name: Run C validation cases
        env:
          REMOTE_TEST_ROOT: /tmp/gtdb-realtests/ci-c
        shell: bash -el {0}
        run: bin/run-real-data-tests-remote.sh C1 C2 C3 C4 C5 C6

      - name: Upload C validation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: validation-c-evidence
          path: /tmp/gtdb-realtests/ci-c/_evidence
          if-no-files-found: warn
