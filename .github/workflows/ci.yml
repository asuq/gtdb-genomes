name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --locked --group dev

      - name: Run pytest
        run: .venv/bin/pytest -q

  validation-offline:
    name: Offline validation runner
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --locked --group dev

      - name: Run offline validation cases
        env:
          LOCAL_LAUNCHER_MODE: module
          LOCAL_TEST_ROOT: /tmp/gtdb-realtests/ci-offline
        run: bin/run-real-data-tests-local.sh A1 A2 A8

      - name: Upload offline validation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: offline-validation-evidence
          path: /tmp/gtdb-realtests/ci-offline/_evidence
          if-no-files-found: warn
