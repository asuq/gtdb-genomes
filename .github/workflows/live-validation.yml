name: Live validation

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: live-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation-live:
    name: Live validation runner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install micromamba
        run: bash bin/install-micromamba-ci.sh

      - name: Create live validation environment
        run: >-
          micromamba create -y -n ci-live python=3.12 uv
          ncbi-datasets-cli=18.21.0 unzip=6.0

      - name: Sync project dependencies
        run: micromamba run -n ci-live uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        run: >-
          micromamba run -n ci-live
          uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Run live validation case B1
        env:
          LOCAL_LAUNCHER_MODE: module
          LOCAL_TEST_ROOT: /tmp/gtdb-realtests/ci-live
        run: >-
          micromamba run -n ci-live
          bash bin/run-real-data-tests-local.sh B1

      - name: Upload live validation evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-validation-evidence
          path: /tmp/gtdb-realtests/ci-live/_evidence
          if-no-files-found: warn
