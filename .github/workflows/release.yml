name: Release validation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Build wheel and sdist
        run: uv build

      - name: Upload built distribution
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist
          if-no-files-found: error

  runtime-validation:
    name: Validate packaged runtime
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download built distribution
        uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist

      - name: Install micromamba
        run: bash bin/install-micromamba-ci.sh

      - name: Create runtime environment
        run: >-
          micromamba create -y -n gtdb-genome-release python=3.12 pip
          ncbi-datasets-cli=18.21.0 unzip=6.0

      - name: Install built wheel into clean runtime
        run: >-
          micromamba run -n gtdb-genome-release
          python -m pip install --force-reinstall dist/*.whl

      - name: Confirm runtime has no uv on PATH
        run: >-
          micromamba run -n gtdb-genome-release
          python -c "import shutil; assert shutil.which('uv') is None"

      - name: Verify installed bundled taxonomy
        run: |
          micromamba run -n gtdb-genome-release python - <<'PY'
          from gtdb_genomes.release_resolver import resolve_and_validate_release
          from gtdb_genomes.taxonomy import load_release_taxonomy

          resolution = resolve_and_validate_release('latest')
          frame = load_release_taxonomy(resolution)
          assert resolution.bacterial_taxonomy is not None, resolution
          assert frame.height > 0, frame
          PY

      - name: Run release validation cases
        env:
          REMOTE_TEST_ROOT: /tmp/gtdb-realtests/release
        run: >-
          micromamba run -n gtdb-genome-release
          bash bin/run-real-data-tests-remote.sh C1 C2 C3 C4 C5 C6

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: runtime-validation
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --title "${GITHUB_REF_NAME}" \
              --notes "" \
              --verify-tag
          fi
