name: Release validation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync project dependencies
        run: uv sync --locked --group dev

      - name: Bootstrap GTDB taxonomy data
        run: uv run python -m gtdb_genomes.bootstrap_taxonomy

      - name: Build wheel and sdist
        run: uv build

      - name: Upload built distribution
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist
          if-no-files-found: error

  runtime-validation:
    name: Validate packaged runtime
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download built distribution
        uses: actions/download-artifact@v5
        with:
          name: release-dist
          path: dist

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: gtdb-genome-release
          init-shell: bash
          cache-downloads: true
          cache-environment: false
          create-args: >-
            python=3.12
            pip
            ncbi-datasets-cli
            unzip

      - name: Install built wheel into clean runtime
        shell: bash -el {0}
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Confirm runtime has no uv on PATH
        shell: bash -el {0}
        run: python -c "import shutil; assert shutil.which('uv') is None"

      - name: Verify installed bundled taxonomy
        shell: bash -el {0}
        run: python -c "from gtdb_genomes.release_resolver import resolve_and_validate_release; resolution = resolve_and_validate_release('latest'); assert resolution.bacterial_taxonomy is not None, resolution"

      - name: Run release validation cases
        env:
          REMOTE_TEST_ROOT: /tmp/gtdb-realtests/release
        shell: bash -el {0}
        run: bin/run-real-data-tests-remote.sh C1 C2 C3 C4 C5 C6
